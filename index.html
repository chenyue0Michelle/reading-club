<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>《稻盛和夫的成功方程式》26天打卡计划</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }

    /* ===== HEADER ===== */
    .header {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 1.6em;
      color: #f5c518;
      text-shadow: 0 0 20px rgba(245,197,24,0.4);
      margin-bottom: 6px;
    }
    .header .formula {
      font-size: 0.95em;
      color: #a0c4ff;
      letter-spacing: 1px;
    }
    .header .dates {
      font-size: 0.8em;
      color: #888;
      margin-top: 4px;
    }

    /* ===== PROGRESS BAR ===== */
    .progress-section {
      padding: 16px 20px 8px;
      max-width: 700px;
      margin: 0 auto;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82em;
      color: #aaa;
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f5c518, #ff6b6b);
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    /* ===== MAIN LAYOUT ===== */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 12px 16px 40px;
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #aaa;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85em;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: rgba(245,197,24,0.2);
      border-color: #f5c518;
      color: #f5c518;
    }

    /* ===== TODAY CARD ===== */
    .today-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .today-card .day-badge {
      display: inline-block;
      background: linear-gradient(135deg, #f5c518, #ff6b6b);
      color: #000;
      font-weight: bold;
      font-size: 0.78em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .today-card h2 {
      font-size: 1.05em;
      color: #f5c518;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .today-card .content-body {
      font-size: 0.9em;
      line-height: 1.9;
      color: #ccc;
    }
    .today-card .content-body p { margin-bottom: 10px; }
    .today-card .content-body blockquote {
      border-left: 3px solid #f5c518;
      padding: 8px 14px;
      margin: 12px 0;
      background: rgba(245,197,24,0.08);
      border-radius: 0 8px 8px 0;
      color: #f5c518;
      font-style: italic;
    }
    .today-card .content-body strong { color: #fff; }
    .today-card .content-body ul, .today-card .content-body ol {
      padding-left: 20px;
      margin: 8px 0;
    }
    .today-card .content-body li { margin-bottom: 6px; }

    /* ===== CHECK-IN BUTTON ===== */
    .checkin-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f5c518, #ff6b6b);
      color: #000;
      font-size: 1em;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .checkin-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .checkin-btn:disabled {
      background: #444;
      color: #888;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== STATUS BOX ===== */
    .status-box {
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.88em;
      margin-bottom: 16px;
    }
    .status-box.not-started { background: rgba(255,255,255,0.05); color: #888; }
    .status-box.in-progress { background: rgba(245,197,24,0.1); color: #f5c518; }
    .status-box.completed { background: rgba(39,174,96,0.15); color: #2ecc71; }

    /* ===== CALENDAR ===== */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .cal-header {
      text-align: center;
      font-size: 0.72em;
      color: #666;
      padding: 4px 0;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78em;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      position: relative;
    }
    .cal-day.empty { background: transparent; cursor: default; }
    .cal-day.future {
      background: rgba(255,255,255,0.04);
      color: #555;
      cursor: default;
    }
    .cal-day.available {
      background: rgba(255,255,255,0.08);
      color: #aaa;
    }
    .cal-day.available:hover {
      background: rgba(245,197,24,0.15);
      border-color: #f5c518;
      color: #f5c518;
    }
    .cal-day.today-marker {
      background: rgba(245,197,24,0.2);
      border-color: #f5c518;
      color: #f5c518;
      font-weight: bold;
    }
    .cal-day.checked {
      background: linear-gradient(135deg, rgba(39,174,96,0.3), rgba(39,174,96,0.1));
      border-color: #2ecc71;
      color: #2ecc71;
    }
    .cal-day.checked::after {
      content: '✓';
      position: absolute;
      bottom: 1px;
      right: 3px;
      font-size: 0.65em;
      color: #2ecc71;
    }

    /* ===== HISTORY LIST ===== */
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .history-item:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(245,197,24,0.3);
    }
    .history-item .h-date { font-size: 0.78em; color: #888; margin-bottom: 4px; }
    .history-item .h-chapter { font-size: 0.9em; color: #f5c518; }
    .history-item .h-checked { font-size: 0.75em; color: #2ecc71; margin-top: 4px; }

    /* ===== TAB CONTENT ===== */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      padding: 20px;
      overflow-y: auto;
    }
    .modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; }
    .modal-box {
      background: #1a2035;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 24px;
      max-width: 680px;
      width: 100%;
      margin-top: 20px;
    }
    .modal-box h3 { color: #f5c518; font-size: 1em; margin-bottom: 14px; line-height: 1.5; }
    .modal-body {
      font-size: 0.88em;
      line-height: 1.9;
      color: #ccc;
    }
    .modal-body p { margin-bottom: 10px; }
    .modal-body blockquote {
      border-left: 3px solid #f5c518;
      padding: 8px 14px;
      margin: 12px 0;
      background: rgba(245,197,24,0.08);
      border-radius: 0 8px 8px 0;
      color: #f5c518;
      font-style: italic;
    }
    .modal-body strong { color: #fff; }
    .modal-body ul, .modal-body ol { padding-left: 20px; margin: 8px 0; }
    .modal-body li { margin-bottom: 6px; }
    .modal-close {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #aaa;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9em;
    }
    .modal-close:hover { background: rgba(255,255,255,0.13); }

    /* ===== LOGIN OVERLAY ===== */
    .login-overlay {
      display: none;
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-overlay.active { display: flex; }
    .login-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .login-box .login-icon { font-size: 3em; margin-bottom: 12px; }
    .login-box h2 { color: #f5c518; font-size: 1.2em; margin-bottom: 6px; }
    .login-box p { color: #888; font-size: 0.85em; margin-bottom: 24px; line-height: 1.6; }
    .login-input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      font-size: 1em;
      padding: 12px 16px;
      text-align: center;
      margin-bottom: 16px;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    .login-input:focus { outline: none; border-color: #f5c518; }
    .login-input::placeholder { color: #555; }
    .login-submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #f5c518, #ff6b6b);
      color: #000;
      font-size: 1em;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .login-submit-btn:hover { opacity: 0.9; }

    /* ===== USER GREETING ===== */
    .user-greeting {
      display: none;
      background: rgba(245,197,24,0.08);
      border: 1px solid rgba(245,197,24,0.2);
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.88em;
    }
    .user-greeting .greet-text { color: #f5c518; }
    .user-greeting .change-name {
      color: #666;
      font-size: 0.8em;
      cursor: pointer;
      text-decoration: underline;
    }
    .user-greeting .change-name:hover { color: #aaa; }

    /* ===== FONT SIZE CONTROLS ===== */
    .font-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      justify-content: flex-end;
    }
    .font-btn {
      padding: 4px 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85em;
      font-weight: bold;
      transition: all 0.2s;
    }
    .font-btn:hover { background: rgba(245,197,24,0.2); border-color: #f5c518; color: #f5c518; }
    .font-size-label { font-size: 0.78em; color: #666; }

    /* ===== RECORDING ===== */
    .record-area {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }
    .record-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #ccc;
      font-size: 1.3em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .record-btn.recording {
      border-color: #ff4757;
      background: rgba(255,71,87,0.15);
      color: #ff4757;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(255,71,87,0); }
    }
    .record-info { flex: 1; }
    .record-status { font-size: 0.85em; color: #aaa; }
    .record-status.active { color: #ff4757; }
    .record-duration { font-size: 0.78em; color: #666; margin-top: 2px; }

    /* ===== REFLECTION ===== */
    .reflection-area {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .reflection-label {
      font-size: 0.82em;
      color: #888;
      margin-bottom: 8px;
    }
    .reflection-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #ddd;
      font-size: 0.88em;
      line-height: 1.7;
      padding: 10px 12px;
      resize: vertical;
      min-height: 80px;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    .reflection-input:focus {
      outline: none;
      border-color: rgba(245,197,24,0.4);
      background: rgba(255,255,255,0.08);
    }
    .reflection-input::placeholder { color: #555; }
    .reflection-saved {
      font-size: 0.78em;
      color: #2ecc71;
      margin-top: 6px;
      display: none;
    }

    /* ===== STATS ===== */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-card .num { font-size: 1.6em; font-weight: bold; color: #f5c518; }
    .stat-card .label { font-size: 0.75em; color: #888; margin-top: 4px; }
  </style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-icon">📖</div>
    <h2>欢迎加入读书打卡</h2>
    <p>《稻盛和夫的成功方程式》<br>26天共读计划 · 4月26日—5月21日</p>
    <input class="login-input" id="loginInput" type="text" placeholder="请输入您的姓名" maxlength="20" />
    <button class="login-submit-btn" onclick="doLogin()">开始打卡 →</button>
  </div>
</div>

<div class="header">

  <h1>📖 稻盛和夫的成功方程式</h1>
  <div class="formula">人生·工作的结果 = 思维方式 × 热情 × 能力</div>
  <div class="dates">2026年4月26日 — 5月21日 · 26天打卡计划</div>
</div>

<div class="progress-section">
  <div class="progress-label">
    <span id="progressText">打卡进度</span>
    <span id="progressCount">0 / 26</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="container">

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="statChecked">0</div>
      <div class="label">已打卡</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statStreak">0</div>
      <div class="label">连续天数</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statRemain">26</div>
      <div class="label">剩余天数</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('today')">📅 今日</button>
    <button class="tab-btn" onclick="switchTab('calendar')">🗓 日历</button>
    <button class="tab-btn" onclick="switchTab('history')">📋 记录</button>
  </div>

  <!-- TODAY TAB -->
  <div class="tab-content active" id="tab-today">

    <!-- 用户问候 -->
    <div class="user-greeting" id="userGreeting">
      <span class="greet-text" id="greetText">👋 你好！</span>
      <span class="change-name" onclick="changeName()">修改姓名</span>
    </div>

    <!-- 字体调节 -->
    <div class="font-controls">
      <span class="font-size-label">字体：</span>
      <button class="font-btn" onclick="changeFontSize(-1)">A−</button>
      <button class="font-btn" onclick="changeFontSize(1)">A+</button>
    </div>

    <div class="today-card" id="todayCard">
      <div class="day-badge" id="todayBadge">第?天</div>
      <h2 id="todayChapter">加载中...</h2>
      <div class="content-body" id="todayContent"></div>
    </div>

    <!-- 录音区域 -->
    <div class="record-area" id="recordArea">
      <button class="record-btn" id="recordBtn" onclick="toggleRecord()">🎤</button>
      <div class="record-info">
        <div class="record-status" id="recordStatus">点击麦克风开始朗读计时</div>
        <div class="record-duration" id="recordDuration"></div>
      </div>
    </div>

    <!-- 感悟输入框 -->
    <div class="reflection-area" id="reflectionArea">
      <div class="reflection-label">📝 写下今日读书感悟</div>
      <textarea class="reflection-input" id="reflectionInput" placeholder="读完后写下您的感悟，提交后完成今日打卡..."></textarea>
      <div class="reflection-saved" id="reflectionSaved">✅ 感悟已保存</div>
    </div>

    <button class="checkin-btn" id="checkinBtn" onclick="doCheckIn()">✅ 今日打卡</button>
    <div class="status-box not-started" id="statusBox">尚未开始打卡</div>
  </div>

  <!-- CALENDAR TAB -->
  <div class="tab-content" id="tab-calendar">
    <div id="calendarContainer"></div>
  </div>

  <!-- HISTORY TAB -->
  <div class="tab-content" id="tab-history">
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <div class="modal-body" id="modalBody"></div>
    <button class="modal-close" onclick="closeModal()">关闭</button>
  </div>
</div>

<script>
// ===== BOOK CONTENT (内嵌，无需外部js文件) =====
const bookContent = {
  '2026-04-26': { chapter: '第1天（4月26日）：新版序言 - 传播哲学、实践利他', content: `<p>稻盛和夫先生是日本京瓷株式会社和KDDI株式会社的创始人，两家企业都进入了世界500强。2010年，他又出任日本航空株式会社会长，成功地让日航扭亏为盈。</p><p>本书作者曹岫云先生于2001年首次聆听稻盛先生讲演，深受感动。此后他致力于翻译和传播稻盛哲学，撰写文章介绍稻盛先生的经营思想。</p><p>稻盛哲学的核心是"作为人，何谓正确"这一命题。稻盛先生认为，经营企业就是经营人心，而人心的根本在于做人的准则。这种哲学不仅适用于企业经营，更适用于每个人的人生。</p><blockquote>"我从不奢望所有的人都能够接受我的哲学，但我一贯坚持自己的经营思想，并证明了它是成功的。"</blockquote><p><strong>今日感悟：</strong>传播正确的哲学需要使命感，实践利他需要坚持。当我们面对人生的困惑和挑战时，不妨问问自己："作为人，何谓正确？"</p>` },
  '2026-04-27': { chapter: '第2天（4月27日）：引言（上）', content: `<p>2001年，在天津第一届中日企业经营哲学国际研讨会上，作者曹岫云先生第一次见到稻盛和夫先生，并聆听了他的讲演。稻盛先生提出的"成功方程式"和"作为人何谓正确"深深打动了在场的每一个人。</p><p>从那以后，作者开始收集稻盛先生的全部著作，认真学习。在学习过程中，他发现盛和塾的企业家塾生们都有许多感人的故事——他们因为实践稻盛哲学，而使自己的企业获得了巨大的成功。</p><blockquote>"我从不奢望所有的人都能够接受我的哲学，但我一贯坚持自己的经营思想，并证明了它是成功的。"</blockquote><p><strong>今日感悟：</strong>真正的智慧往往简单而深刻。当我们面对困难时，不要轻易放弃，要像稻盛先生说的那样，"付出不亚于任何人的努力"。</p>` },
  '2026-04-28': { chapter: '第3天（4月28日）：引言（下）', content: `<p>2005年，作者在日本滋贺县参加盛和塾例会时，深深感受到了稻盛先生谦逊的人格魅力。稻盛先生虽然是两家世界500强企业的创始人，但他始终保持着谦逊的态度。</p><p>稻盛先生说："我只是一个普通人，只是比别人更努力一些而已。如果要说有什么秘诀，那就是'付出不亚于任何人的努力'和'作为人，何谓正确'。"</p><p>稻盛哲学对中国企业家具有重要的参考价值。在中国经济高速发展的今天，我们不仅需要学习西方的管理技术，更需要学习稻盛先生这种以人为本的经营哲学。</p><p><strong>今日感悟：</strong>谦逊是一种美德，更是一种力量。真正的成功者，不是那些趾高气扬的人，而是那些始终保持谦逊、不断学习和进步的人。</p>` },
  '2026-04-29': { chapter: '第4天（4月29日）：第一章 成功方程式 - 方程式与思想·人格', content: `<p>稻盛先生提出了著名的成功方程式：</p><p><strong>人生·工作的结果 = 思维方式 × 热情 × 能力</strong></p><ul><li><strong>能力</strong>：先天的智力和体力，范围是0~100。</li><li><strong>热情</strong>：努力的程度，范围是0~100。</li><li><strong>思维方式</strong>：思想·人格，范围是-100~+100。这是最重要的要素，因为它有方向性。</li></ul><p>为什么思维方式是相乘？如果思维方式为负，无论能力和热情多高，结果都是负的。比如：能力100 × 热情100 × 思维方式(-1) = -10000，结果是巨大的负数。</p><blockquote>"能力一般但努力的人，可以超越天才。"</blockquote><p><strong>今日感悟：</strong>思维方式是最重要的要素，因为它有方向性。在追求成功的过程中，首先要确保自己的思维方式是正确的，要时常问自己："作为人，何谓正确？"</p>` },
  '2026-04-30': { chapter: '第5天（4月30日）：第一章 成功方程式 - 思想·人格的含义', content: `<p>方程式中最重要的要素是"思想·人格"。稻盛先生将其分为人格侧面和科学侧面：</p><p><strong>人格侧面：</strong>公正、诚实、开朗、勇敢、谦虚、善良、克己、利他。</p><p><strong>科学侧面：</strong>实事求是、实践认识论。认识来源于实践，又指导实践。</p><blockquote>"人格是人生的方向盘，能力是发动机。如果方向盘失灵，发动机再强大，也会走向毁灭。"</blockquote><p><strong>今日感悟：</strong>"思想·人格"不是抽象的概念，而是具体的行为准则。它体现在我们日常的一举一动中，是我们做人做事的根本。</p>` },
  '2026-05-01': { chapter: '第6天（5月1日）：第一章 成功方程式 - 三要素关系与提升方法', content: `<p>三要素是相乘关系：如果思维方式为负，结果必为负。希特勒就是反面例子：他有很强的能力和极大的热情，但思维方式是极端负面的，给人类带来了巨大灾难。</p><p><strong>如何提升思想·人格？稻盛先生提出三个方法：</strong></p><ol><li><strong>学习</strong>：阅读经典，学习先贤的智慧，开阔自己的视野。</li><li><strong>反省</strong>：每天结束时，回顾一天的言行。稻盛先生说："反省就像照镜子，可以让我们看清自己的真实面貌。"</li><li><strong>实践</strong>：在实践中检验和提升自己的思想，将知识转化为自己的思想·人格。</li></ol><blockquote>"知道不等于做到，做到不等于做好。只有在实践中不断磨练，才能真正提升自己。"</blockquote><p><strong>今日感悟：</strong>思想·人格是可以提升的，关键在于我们是否愿意学习、反省和实践。这是一个持续一生的过程。</p>` },
  '2026-05-02': { chapter: '第7天（5月2日）：第二章 成功方程式的产生 - 实践中得出理论', content: `<p>稻盛先生是如何创造出成功方程式的？他说：</p><blockquote>"从实践中得出理论，从现象中看出本质。"</blockquote><p>创造需要三个要素：</p><ol><li><strong>集中意识</strong>：将注意力集中在某一事物上，排除其他干扰。</li><li><strong>调动潜意识</strong>：潜意识中蕴含着巨大的能量，可以获得意想不到的灵感和智慧。</li><li><strong>苦苦思索</strong>：只有经过苦苦思索，才能产生真正的创造。</li></ol><p>稻盛先生后来在创建京瓷公司时，为了鼓励普通员工，创造了这个方程式——告诉他们：即使能力一般，只要努力，并且保持正确的思维方式，就能取得成功。</p><p><strong>今日感悟：</strong>真正的智慧来自实践。要善于从实践中学习，从现象中看出本质，这样才能获得真正的智慧。</p>` },
  '2026-05-03': { chapter: '第8天（5月3日）：第二章 成功方程式的产生 - 肺结核和心态', content: `<p>稻盛先生13岁时患了肺结核，这在当时是不治之症。他阅读了《生命的实相》这本书，书中说：</p><blockquote>"心态吸引灾难，恐惧招致疾病。"</blockquote><p>稻盛先生意识到，自己之所以患病，是因为内心充满了恐惧——这种恐惧的心态，反而吸引了他最害怕的事情。当他改变心态，不再恐惧，而是积极面对时，他的病情开始好转，最终康复。</p><blockquote>"人生的遭遇，全由心态所造。"</blockquote><p><strong>今日感悟：</strong>心态决定命运。当我们以积极的心态面对困难时，困难就会变成成长的机会；当我们以消极的心态面对困难时，困难就会变成灾难。</p>` },
  '2026-05-04': { chapter: '第9天（5月4日）：第二章 成功方程式的产生 - 水库式经营与愿望', content: `<p>松下幸之助先生提出了"水库式经营"的概念，有人问他怎样才能做到，他回答：</p><blockquote>"你必须得这么想。"</blockquote><p>思念是"因"，没有因哪有果。只有强烈的愿望，才能带来实际的结果。</p><p>稻盛先生强调愿望有三个层次：</p><ol><li>一般愿望</li><li>强烈的愿望</li><li>渗透到潜意识的愿望（只有这一层次，才能真正带来成功）</li></ol><blockquote>"强烈而持久的愿望是成功的关键。"</blockquote><p><strong>今日感悟：</strong>"你必须得这么想"——只有发自内心的强烈愿望，才能驱动我们克服困难，实现目标。</p>` },
  '2026-05-05': { chapter: '第10天（5月5日）：第三章 成功三要素（能力）- 如实承认与超越平庸', content: `<p>成功三要素之一是"能力"。稻盛先生说：</p><blockquote>"做不到的事要如实承认。"</blockquote><p>承认自己的不足，是提升能力的第一步。很多人之所以无法提升，是因为他们不愿意承认自己的不足，总是找借口，把责任推给别人或环境。</p><blockquote>"战胜自己是最伟大的能力。"</blockquote><p>超越平庸不是超越别人，而是超越自己。意志的强弱也是能力的一部分。一个人可能智力一般，但如果有坚强的意志，就能取得超越常人的成就。</p><p><strong>今日感悟：</strong>承认不足不是软弱，而是智慧；超越平庸不是梦想，而是可能。要勇于承认自己的不足，同时要有坚强的意志，不断挑战自己，超越自己。</p>` },
  '2026-05-06': { chapter: '第11天（5月6日）：第三章 成功三要素（能力）- 胆大心细与抑制本能', content: `<p><strong>胆大心细：</strong>事业需要两种性格——既要有胆大的魄力，又要有心细的谨慎。这两种性格看似矛盾，但实际上是相辅相成的。</p><p><strong>抑制本能心：</strong>人有许多本能的欲望，如果任由本能驱使，就会做出错误的判断。稻盛先生说：</p><blockquote>"让理性发挥作用。"</blockquote><p><strong>将意识聚焦（有意注意）：</strong>有意识地、主动地将注意力集中在某一事物上，这是一种可以培养的能力。</p><p><strong>能力用将来进行时：</strong></p><blockquote>"能力用将来进行时。"</blockquote><p>不要只关注自己现在有多少能力，要相信自己未来可以拥有更多的能力。人的潜能是无限的。</p><p><strong>今日感悟：</strong>能力的培养需要平衡——既要有胆量，又要有细心；既要发挥本能，又要抑制过度的本能；既要看到现在，又要相信未来。</p>` },
  '2026-05-07': { chapter: '第12天（5月7日）：第三章 成功三要素（能力）- 塑造人格与问答', content: `<p>能力的发挥需要高尚人格的驾驭。稻盛先生说：</p><blockquote>"塑造自己的人格，不做才能的奴隶。"</blockquote><p>人格是主人，才能是工具。才能本身是中性的，关键在于使用才能的人的人格。</p><p><strong>能力的七种类型：</strong></p><ol><li><strong>技术能力</strong>：掌握专业技术</li><li><strong>管理能力</strong>：组织、协调、控制</li><li><strong>沟通能力</strong>：与人交流、协调</li><li><strong>创新能力</strong>：创造新事物、新方法</li><li><strong>决策能力</strong>：复杂情况下做出正确判断</li><li><strong>执行能力</strong>：将计划付诸实施</li><li><strong>学习能力</strong>：学习新知识、新技能（最重要）</li></ol><blockquote>"领导人最重要的资质不是能力，而是人格。"</blockquote><p><strong>今日感悟：</strong>能力是工具，人格是方向。只有方向正确，工具才能发挥正面作用；方向错误，工具越强大，危害越大。</p>` },
  '2026-05-08': { chapter: '第13天（5月8日）：第三章 成功三要素（努力）- 工作的意义与突破壁障', content: `<p>成功三要素之二是"努力"。稻盛先生说：</p><blockquote>"工作的意义不仅是赚钱，更是精神满足。"</blockquote><blockquote>"工作是最好的修行。通过工作，我们可以磨练自己的意志，提升自己的能力，完善自己的人格。"</blockquote><p><strong>突破壁障：</strong></p><blockquote>"成功之前决不放弃。一念之差，天壤之别。在最难熬的时候，往往是成功即将到来的时候。这时候，只要再坚持一下，就能突破壁障，迎来成功。"</blockquote><p><strong>今日感悟：</strong>努力不是盲目的辛苦，而是有目标的坚持。工作的意义在于实现自我价值，要把工作当作提升自己、实现价值的途径。</p>` },
  '2026-05-09': { chapter: '第14天（5月9日）：第三章 成功三要素（努力）- 热情开创新时代', content: `<p>稻盛先生说：</p><blockquote>"热情是开创新事业、新时代的动力源泉。"</blockquote><p><strong>迷恋工作：</strong></p><blockquote>"只有迷恋工作，才能做好工作。如果你不喜欢自己的工作，那就试着去喜欢它。只要你全身心投入，你就会逐渐发现工作的乐趣，最终爱上它。"</blockquote><p><strong>精于一业：</strong></p><blockquote>"精于一业，触类旁通。"</blockquote><p>只有专注于某一领域，深入钻研，才能真正掌握这个领域的精髓。</p><p><strong>自辟蹊径：</strong></p><blockquote>"困境中往往蕴含着机会。当大家都向右转时，你不妨向左转。"</blockquote><p><strong>今日感悟：</strong>热情是可以培养的。当我们全身心投入工作时，就会逐渐产生热爱；当我们热爱工作时，就会创造出卓越的成果。</p>` },
  '2026-05-10': { chapter: '第15天（5月10日）：第三章 成功三要素（努力）- 健全精神与反省', content: `<p><strong>健全的精神寓于健全的肉体：</strong></p><blockquote>"身体健康是努力的基础。健全的精神寓于健全的肉体。只有身体健康，精神才能健康。"</blockquote><p><strong>人生须时时反省：</strong></p><blockquote>"每天反省自己的思想和行为。"</blockquote><p>稻盛先生的反省包括：今天是否有不当的言行？今天是否有自私自利的行为？今天是否尽到了最大的努力？今天是否对他人表示了感谢？</p><p><strong>读书开阔视野：</strong></p><blockquote>"读书可以开阔视野，增长智慧。我每天都要读书，即使只有半小时。读书已经成为我生活的一部分。"</blockquote><p><strong>今日感悟：</strong>努力需要身心的健康作为支撑。要注意身体健康，要每天反省，要持续学习，要激发团队的能量。</p>` },
  '2026-05-11': { chapter: '第16天（5月11日）：第三章 成功三要素（努力）- 天天努力与问答', content: `<p>稻盛先生说：</p><blockquote>"过好每一天，就是过好一生。不要想着明天再努力，今天就要努力。"</blockquote><p><strong>将来的延长线是今天：</strong></p><blockquote>"今天的努力是明天成功的基础。将来的延长线是今天。今天的努力，决定了明天的位置。"</blockquote><p><strong>项目成功之前决不放弃：</strong></p><blockquote>"成功往往就在再坚持一下的努力之中。"</blockquote><p><strong>潜在能力通过努力变为现实：</strong></p><blockquote>"努力可以将潜能转化为现实的能力。每个人都有无限的潜能，关键在于是否愿意付出努力。"</blockquote><p><strong>今日感悟：</strong>努力是一种习惯，是一种生活方式。当我们把努力变成日常，成功就会变成必然。</p>` },
  '2026-05-12': { chapter: '第17天（5月12日）：第三章 成功三要素（思想·人格）- 希望与正道', content: `<p>成功三要素之三是"思想·人格"。稻盛先生说：</p><blockquote>"决不丧失希望，即使在最低潮。我们决不可能完全摆脱痛苦和烦恼，但是，即使处于最低潮，我们仍然可以努力，不失去对明日的希望。"</blockquote><blockquote>"作为人，何谓正确？在漫长的人生旅途中，会经历多种失败、困难和挫折，但是这一切，同时也是难得的磨炼心志的机会。上苍决不会无视真诚的努力和追求正确的决心。"</blockquote><blockquote>"走安逸之道，大抵都到不了目的地。"</blockquote><blockquote>"信赖应从自己内心而不是从外面求得。如果自己不能成为一个值得别人信赖的人，与别人之间的信赖关系就无法建立。"</blockquote><p><strong>今日感悟：</strong>思想·人格是人生的指南针。只有方向正确，努力才有意义；只有心存希望，才能战胜困难。</p>` },
  '2026-05-13': { chapter: '第18天（5月13日）：思想·人格 - 决不丧失希望（原文精读）', content: `<p>稻盛先生说：</p><blockquote>"我相信：我们心中所想的事物，会由现象呈现出来。"</blockquote><p>稻盛先生刚踏入社会时，住在一间地板翘裂的破旧宿舍，面积不足10平方米，公司的研究工作不顺利，人际关系也不和谐。宿舍背后有一条小河，河边有一排樱花树，黄昏时分，他常常独坐河畔，吟唱童谣《故乡》，打起精神，投入明天的工作。</p><blockquote>"我们决不可能完全摆脱痛苦和烦恼，但是，即使处于最低潮，我们仍然可以努力，不失去对明日的希望。"</blockquote><p>只要心不死，就是不失希望，坚持努力，人生就能时来运转。不要只看稻盛先生现在如何成功，他年轻时同我们有一样的苦恼、一样的失意、一样的徘徊。问题是不要陷进去，要解脱出来并朝着希望奋进不息。</p><p><strong>今日感悟：</strong>比稻盛先生的成功更重要的，是他在最低谷时仍不放弃希望的那份坚持。人生的苦难是共有的，关键是如何面对。</p>` },
  '2026-05-14': { chapter: '第19天（5月14日）：思想·人格 - 追求人间正道（原文精读）', content: `<p>稻盛先生说：</p><blockquote>"我年轻时就学会了自问：'作为人，何谓正确？'面对社会的丑恶现象，我会自言自语：'不能这样，这不是人应该做的，理想的人不该如此。'我领悟到，一颗追求正确的心，也就是追求理想的心。"</blockquote><p>升学考试落榜，就职考试失败，他曾十分沮丧，但并不服输。即使处于近乎绝望的环境，仍然不失希望，为了实现自己的理想，拼命地、不知疲倦地工作。</p><blockquote>"在漫长的人生旅途中，会经历多种失败、困难和挫折，但是这一切，同时也是难得的磨炼心志的机会，促使你发愤图强，通过诚实的努力，去实现自己的理想。上苍决不会无视真诚的努力和追求正确的决心。"</blockquote><p>每个人在人生的各个时期都会遭遇困难或问题。把困难或问题看作机会还是看作倒霉，这才是关键——对待问题的态度往往比问题本身更重要。</p><p><strong>今日感悟：</strong>问题即机会。遇到问题和解决问题，是人生意义的精彩所在。</p>` },
  '2026-05-15': { chapter: '第20天（5月15日）：思想·人格 - 避开"捷径"（原文精读）', content: `<p>稻盛先生说：</p><blockquote>"大学毕业后不久，我去京都一家小型陶瓷公司工作。我与公司管理层发生争执，又受到工会的攻击，曾陷入孤立无援的境地。当时，一位上司好心劝我妥协，走一条好走的路。"</blockquote><p>稻盛先生最终选择走崎岖的路，作垂直攀登：</p><blockquote>"我知道我是一个脆弱的人，如果选择好走的路，慢慢地爬，在到达山顶之前，恐怕我已经放弃了。走安逸之道，大抵都到不了目的地。"</blockquote><p>稻盛先生正因为自己没有私心，工作时又身先士卒，所以他可以公正理直气壮，无须回避矛盾，不必把事情人为地复杂化。正因为如此，他才能带领团队到达光辉的成功之顶。</p><p><strong>今日感悟：</strong>真正的捷径往往是看起来最艰难的正道。无私心者无惧险阻。</p>` },
  '2026-05-16': { chapter: '第21天（5月16日）：思想·人格 - 信赖与如实观察（原文精读）', content: `<p>稻盛先生说：</p><blockquote>"我意识到，如果自己不能成为一个值得别人信赖的人，与别人之间的信赖关系就无法建立。与别人的信赖关系，不过是自己内心的一种外在反映。"</blockquote><p>中国明代《菜根谭》："信人者，人未必尽诚，己则独诚矣；疑人者，人未必皆诈，己则先诈矣。"——"宁人负我，我不负人"，我们应有这种气度。</p><p><strong>如实观察：</strong></p><blockquote>"心纯见真，清澈纯粹的心灵可以看见真相。充满利己的心目中，只呈现复杂的事相、利己的动机，势必模糊问题的焦点。"</blockquote><p>苏东坡诗云："横看成岭侧成峰，远近高低各不同。不识庐山真面目，只缘身在此山中。"要正确认识事物，就要从前后、左右、远近、内外各个方面认真调查研究。</p><p><strong>今日感悟：</strong>信赖从自身开始，观察需要纯粹的心灵。利己心越强，越看不清真相。</p>` },
  '2026-05-17': { chapter: '第22天（5月17日）：思想·人格 - 调动潜意识与通逻辑合伦理（原文精读）', content: `<p>稻盛先生说：</p><blockquote>"人的潜意识中有一种力量，能对复杂事情做出正确迅速的判断。印象强烈的事件以及再三重复的经验，会进入潜意识，储存起来，以惊人的速度做出正确的判断。"</blockquote><p>弗洛伊德认为，潜意识的心理活动如水下巨大的海床，在人的生活中起决定性作用。调动潜意识需要两个要点：<strong>反复</strong>（量）和<strong>力度</strong>（质）。</p><p><strong>通逻辑、合伦理：</strong></p><blockquote>"我们每个人心中，都有各自判断事物的基准。判断基准应该能够答复'作为人，何谓正确？'这一命题，要符合道德、伦理，符合原理原则。"</blockquote><p>缺少"哲学"的人，难于达成有价值的事业；拥有哲学的人，可以做成许多事业，因为哲学就是引导人们走向正确和成功的指南针。</p><p><strong>今日感悟：</strong>内心的哲学指导我们做出正确的决策。不是心血来潮，不凭个人好恶随意判断。</p>` },
  '2026-05-18': { chapter: '第23天（5月18日）：第四章 经营十二条（上）', content: `<p>经营十二条是稻盛先生对自己的经营实践进行深入思考的产物，它揭示了企业经营的规律。照它办，经营就能成功；违背它，经营难免失败。</p><blockquote>稻盛先生说："几十年来我全身心投入了京瓷和KDDI的经营，在这过程中我懂得了存在着使事业获得成功所必需的普遍性的原则，超越了时代和环境的差异，我把这些原则归结为'经营的原点'十二条。"</blockquote><p><strong>经营十二条（1-6条）：</strong></p><ol><li><strong>明确事业的目的意义</strong>——树立光明正大、符合大义名分的、崇高的事业目的。</li><li><strong>设立具体的目标</strong>——所设目标随时与员工共有。</li><li><strong>心怀强烈的愿望</strong>——持续怀有渗透到潜意识的强烈的愿望。</li><li><strong>做出不亚于任何人的努力</strong>——一步一步地、扎扎实实地、坚持不懈地做好具体朴实的工作。</li><li><strong>销售最大化，经费最小化</strong>——利润无须强求，量入、制出，利润将随之而来。</li><li><strong>定价即经营</strong>——定价是经营者的事。找出使客户满意、自己又赚钱的交汇点。</li></ol><p><strong>今日感悟：</strong>经营与经营者的人格、意志、精神力之间的关联性更大。与其说经营是技巧，不如说经营更是一种哲学。</p>` },
  '2026-05-19': { chapter: '第24天（5月19日）：第四章 经营十二条（下）', content: `<p>稻盛先生说，经营成败取决于经营者的行动。如果经营者认真学习、果断落实这十二条，经营者就会变，变得判若两人。经营者变，公司的干部就跟着变，公司的员工也跟着变。</p><p><strong>经营十二条（7-12条）：</strong></p><ol start="7"><li><strong>经营由意志决定</strong>——经营需要洞穿岩石般的坚强意志。</li><li><strong>燃烧的"斗魂"</strong>——经营需要昂扬的斗志，其程度不亚于格斗。</li><li><strong>临事有勇</strong>——不能有卑怯的举止。</li><li><strong>不断创新</strong>——日复一日，年复一年，不断琢磨，不断改进，精益求精。</li><li><strong>有同情心，诚实待人</strong>——买卖各方都得利，皆大欢喜。</li><li><strong>抱着梦想和希望</strong>——保持开朗的心态。</li></ol><p>在日本、美国、巴西盛和塾的企业家塾生中，因切实执行这十二条，在一两年内迅速成长的企业比比皆是。</p><p><strong>今日感悟：</strong>稻盛先生既是企业家又是哲学家，从经营实践到经营哲学，事业持续成功，思想与时俱进。</p>` },
  '2026-05-20': { chapter: '第25天（5月20日）：第五章 六项精进', content: `<p>六项精进之间存在着内在的联系。一个有一定能力的人，如果持续"付出了不亚于任何人的努力"，就会取得某种程度的成功。而人一旦成功，就会骄傲起来——所以第二项就是"要谦虚，不要骄傲"。</p><p><strong>六项精进内容：</strong></p><ol><li><strong>付出不亚于任何人的努力</strong><br>努力是一切生命都在承担的义务。只要喜欢，再努力也心甘。拼命工作可以磨炼灵魂。</li><li><strong>要谦虚、不要骄傲</strong><br>才能是上天所赐，将自己的才能用于为"公"是第一义。"谦受益"是中国古话。</li><li><strong>要每天反省</strong><br>每天检点自己的思想和行为，直视自我。</li><li><strong>活着，就要感谢</strong><br>"感谢之心"像地下水一样，滋润着我道德观的根基。只要活着，就要感谢。</li><li><strong>积善行、思利他</strong><br>积善之家必有余庆。言行之间留意关爱别人。真正为对方好，才是利他。</li><li><strong>不要有感性的烦恼</strong><br>活着就会遭遇各种困难和挫折，绝不能被它们击垮，绝不能逃避。正面对，垂直攀登，硬着头皮顶住，不忘初衷。</li></ol><p><strong>今日感悟：</strong>六项精进如此周而复始，就是人生最好的修炼。</p>` },
  '2026-05-21': { chapter: '第26天（5月21日）：后记', content: `<p>走进书店，关于"成功"的书籍丰富多彩。但其中大多数，都着眼于能力、手法、技术、技巧、计策等，甚至把军事上的"兵不厌诈"用到经营乃至其他领域。这种基本观念上的混乱，正是所有社会混乱现象的根源。</p><p>"稻盛的成功方程式"则旗帜鲜明，它把"思想·人格"放在第一位，而且指明它有正负。这个方程式犹如巨大的警钟，应该震撼我们这个追名逐利的社会。</p><blockquote>"在认真学习、深入思考、反复实践的过程中，不断驱动这种'显意识'，它才能进入'潜意识'。只有当'显意识'和'潜意识'都由正确观念占据，人才会走进悟境，才有所谓'厚积薄发'。"</blockquote><blockquote>"我从不奢望所有的人都能够接受我的哲学，但我一贯坚持自己的经营思想，并证明了它是成功的。"</blockquote><p style="text-align:center;margin-top:16px;font-size:1.1em;color:#f5c518;">🎉 26天打卡圆满完成！愿稻盛哲学的智慧永驻心中，指引我们走向正确而美好的人生！</p>` }
};

// ===== LOGIN =====
const USER_KEY = 'daosheng_username';

function doLogin() {
  const input = document.getElementById('loginInput');
  const name = input.value.trim();
  if (!name) { input.style.borderColor = '#ff4757'; setTimeout(() => input.style.borderColor = '', 1000); return; }
  localStorage.setItem(USER_KEY, name);
  document.getElementById('loginOverlay').classList.remove('active');
  showGreeting(name);
  init();
}

function showGreeting(name) {
  const el = document.getElementById('userGreeting');
  document.getElementById('greetText').textContent = `👋 ${name}，你好！欢迎打卡`;
  el.style.display = 'flex';
}

function changeName() {
  document.getElementById('loginInput').value = localStorage.getItem(USER_KEY) || '';
  document.getElementById('loginOverlay').classList.add('active');
}

// 支持回车登录
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  const savedName = localStorage.getItem(USER_KEY);
  if (savedName) {
    showGreeting(savedName);
    init();
  } else {
    document.getElementById('loginOverlay').classList.add('active');
  }
});

// ===== FONT SIZE =====
let currentFontSize = parseInt(localStorage.getItem('daosheng_fontsize') || '14');

function applyFontSize() {
  document.getElementById('todayContent').style.fontSize = currentFontSize + 'px';
  const modalBody = document.getElementById('modalBody');
  if (modalBody) modalBody.style.fontSize = currentFontSize + 'px';
}

function changeFontSize(delta) {
  currentFontSize = Math.min(22, Math.max(12, currentFontSize + delta));
  localStorage.setItem('daosheng_fontsize', currentFontSize);
  applyFontSize();
}

// ===== RECORDING =====
let recordTimer = null;
let recordSeconds = 0;
let isRecording = false;

function toggleRecord() {
  const btn = document.getElementById('recordBtn');
  const status = document.getElementById('recordStatus');
  const duration = document.getElementById('recordDuration');

  if (!isRecording) {
    isRecording = true;
    recordSeconds = 0;
    btn.classList.add('recording');
    btn.textContent = '⏹';
    status.className = 'record-status active';
    status.textContent = '🔴 正在计时...';
    recordTimer = setInterval(() => {
      recordSeconds++;
      const m = Math.floor(recordSeconds / 60);
      const s = recordSeconds % 60;
      duration.textContent = `已读 ${m > 0 ? m + '分' : ''}${s}秒`;
    }, 1000);
  } else {
    isRecording = false;
    clearInterval(recordTimer);
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    status.className = 'record-status';
    const m = Math.floor(recordSeconds / 60);
    const s = recordSeconds % 60;
    const timeStr = `${m > 0 ? m + '分' : ''}${s}秒`;
    status.textContent = `✅ 本次朗读：${timeStr}`;
    duration.textContent = '点击麦克风可重新计时';
    // 保存朗读时长到今日数据
    const today = todayStr();
    const checkins = getCheckins();
    if (checkins[today] && typeof checkins[today] === 'object') {
      checkins[today].readTime = timeStr;
    }
    saveCheckins(checkins);
  }
}

// ===== CONFIG =====
const START_DATE = '2026-04-26';
const END_DATE   = '2026-05-21';
const TOTAL_DAYS = 26;
const STORAGE_KEY = 'daosheng_checkins_v2';

// ===== UTILITIES =====
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateAdd(dateStr, days) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getCheckins() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveCheckins(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function getDayIndex(dateStr) {
  const start = new Date(START_DATE + 'T00:00:00');
  const target = new Date(dateStr + 'T00:00:00');
  return Math.round((target - start) / 86400000) + 1;
}

// ===== INIT =====
function init() {
  renderToday();
  renderCalendar();
  renderHistory();
  updateStats();
}

// ===== TODAY =====
function renderToday() {
  const today = todayStr();
  const checkins = getCheckins();
  const data = bookContent[today];

  const badge = document.getElementById('todayBadge');
  const chapter = document.getElementById('todayChapter');
  const contentEl = document.getElementById('todayContent');
  const btn = document.getElementById('checkinBtn');
  const statusBox = document.getElementById('statusBox');

  if (!data) {
    // out of range
    const idx = getDayIndex(today);
    if (new Date(today) < new Date(START_DATE)) {
      badge.textContent = '待开始';
      chapter.textContent = '阅读计划尚未开始';
      contentEl.innerHTML = '<p>打卡活动将于 <strong>2026年4月26日</strong> 正式开始，请耐心等待！</p>';
      btn.textContent = '⏳ 尚未开始';
      btn.disabled = true;
      statusBox.className = 'status-box not-started';
      statusBox.textContent = '活动将于 4月26日 开始';
    } else {
      badge.textContent = '已结束';
      chapter.textContent = '26天打卡计划已圆满完成！';
      contentEl.innerHTML = '<p>🎉 恭喜完成 26 天的阅读打卡之旅！</p>';
      btn.textContent = '✅ 计划已结束';
      btn.disabled = true;
      statusBox.className = 'status-box completed';
      statusBox.textContent = '26天打卡圆满完成！';
    }
    return;
  }

  const dayIdx = getDayIndex(today);
  badge.textContent = `第 ${dayIdx} 天`;
  chapter.textContent = data.chapter;
  contentEl.innerHTML = data.content;
  applyFontSize();

  if (checkins[today]) {
    const record = checkins[today];
    const timeStr = typeof record === 'object' ? record.time : record;
    const readTime = typeof record === 'object' ? record.readTime : '';
    const reflection = typeof record === 'object' ? record.reflection : '';

    btn.textContent = '✅ 今日已打卡';
    btn.disabled = true;
    statusBox.className = 'status-box completed';
    let statusText = `✅ 今日已打卡 · ${timeStr}`;
    if (readTime) statusText += ` · ${readTime}`;
    statusBox.textContent = statusText;

    // 恢复感悟
    if (reflection) {
      document.getElementById('reflectionInput').value = reflection;
      document.getElementById('reflectionSaved').style.display = 'block';
    }
    document.getElementById('reflectionInput').disabled = true;
  } else {
    btn.textContent = '✅ 今日打卡';
    btn.disabled = false;
    statusBox.className = 'status-box in-progress';
    statusBox.textContent = '📖 今日内容已解锁，请阅读后打卡';
    document.getElementById('reflectionInput').disabled = false;
  }
}

// ===== CHECK IN =====
function doCheckIn() {
  const today = todayStr();
  const checkins = getCheckins();
  if (checkins[today]) return;

  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  // 读取感悟
  const reflection = (document.getElementById('reflectionInput').value || '').trim();
  // 读取朗读时长
  const readTimeEl = document.getElementById('recordStatus');
  const readTime = isRecording ? '' : (readTimeEl.textContent.includes('本次朗读') ? readTimeEl.textContent.replace('✅ ', '') : '');

  checkins[today] = { time: timeStr, reflection, readTime };
  saveCheckins(checkins);

  document.getElementById('checkinBtn').textContent = '✅ 今日已打卡';
  document.getElementById('checkinBtn').disabled = true;
  document.getElementById('statusBox').className = 'status-box completed';
  let statusText = `✅ 今日已打卡 · ${timeStr}`;
  if (readTime) statusText += ` · ${readTime}`;
  document.getElementById('statusBox').textContent = statusText;

  // 显示感悟已保存
  if (reflection) {
    const saved = document.getElementById('reflectionSaved');
    saved.style.display = 'block';
  }

  // 停止录音计时
  if (isRecording) toggleRecord();

  renderCalendar();
  renderHistory();
  updateStats();
}


// ===== STATS =====
function updateStats() {
  const checkins = getCheckins();
  const today = todayStr();
  const keys = Object.keys(bookContent);

  const checkedDays = keys.filter(k => checkins[k]).length;
  document.getElementById('statChecked').textContent = checkedDays;
  document.getElementById('progressCount').textContent = `${checkedDays} / ${TOTAL_DAYS}`;
  document.getElementById('progressFill').style.width = `${(checkedDays / TOTAL_DAYS * 100).toFixed(1)}%`;

  // streak
  let streak = 0;
  let d = today;
  while (checkins[d] && bookContent[d]) {
    streak++;
    d = dateAdd(d, -1);
  }
  document.getElementById('statStreak').textContent = streak;

  // remain
  const remain = Math.max(0, TOTAL_DAYS - checkedDays);
  document.getElementById('statRemain').textContent = remain;

  document.getElementById('progressText').textContent = `打卡进度 ${(checkedDays / TOTAL_DAYS * 100).toFixed(0)}%`;
}

// ===== CALENDAR =====
function renderCalendar() {
  const checkins = getCheckins();
  const today = todayStr();
  const container = document.getElementById('calendarContainer');

  // Build months April and May 2026
  const months = [
    { year: 2026, month: 4, label: '2026年4月' },
    { year: 2026, month: 5, label: '2026年5月' }
  ];

  let html = '';
  const weekDays = ['日','一','二','三','四','五','六'];

  months.forEach(({ year, month, label }) => {
    const firstDay = new Date(year, month - 1, 1).getDay();
    const daysInMonth = new Date(year, month, 0).getDate();

    html += `<div style="margin-bottom:20px;">
      <div style="text-align:center;color:#f5c518;font-size:0.9em;margin-bottom:10px;font-weight:bold;">${label}</div>
      <div class="calendar-grid">`;

    weekDays.forEach(w => {
      html += `<div class="cal-header">${w}</div>`;
    });

    for (let i = 0; i < firstDay; i++) {
      html += `<div class="cal-day empty"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const inRange = bookContent[dateStr];
      const isToday = dateStr === today;
      const isFuture = dateStr > today;
      const isChecked = checkins[dateStr];

      let cls = 'cal-day';
      if (!inRange) {
        cls += isFuture ? ' future' : ' empty';
      } else if (isChecked) {
        cls += ' checked';
      } else if (isToday) {
        cls += ' today-marker';
      } else if (isFuture) {
        cls += ' future';
      } else {
        cls += ' available';
      }

      const onclick = inRange && !isFuture ? `onclick="showDayModal('${dateStr}')"` : '';
      html += `<div class="${cls}" ${onclick}>${d}</div>`;
    }

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

// ===== HISTORY =====
function renderHistory() {
  const checkins = getCheckins();
  const today = todayStr();
  const keys = Object.keys(bookContent).sort().reverse();
  const list = document.getElementById('historyList');

  if (keys.length === 0) {
    list.innerHTML = '<p style="color:#666;text-align:center;padding:20px;">暂无记录</p>';
    return;
  }

  list.innerHTML = keys.map(dateStr => {
    const data = bookContent[dateStr];
    const isChecked = checkins[dateStr];
    const isFuture = dateStr > today;
    const dayIdx = getDayIndex(dateStr);
    const dateLabel = dateStr.replace('2026-', '').replace('-', '月') + '日';

    let checkedLabel = '';
    if (isChecked) {
      const timeStr = typeof isChecked === 'object' ? isChecked.time : isChecked;
      const reflection = typeof isChecked === 'object' ? isChecked.reflection : '';
      const readTime = typeof isChecked === 'object' ? isChecked.readTime : '';
      checkedLabel = `<div class="h-checked">✅ 已打卡 ${timeStr}${readTime ? ' · ' + readTime : ''}</div>`;
      if (reflection) checkedLabel += `<div style="font-size:0.78em;color:#aaa;margin-top:4px;">💬 ${reflection.slice(0,40)}${reflection.length>40?'...':''}</div>`;
    }

    return `<div class="history-item" onclick="showDayModal('${dateStr}')">
      <div class="h-date">${dateLabel} · 第${dayIdx}天 ${isFuture ? '<span style="color:#555">（未解锁）</span>' : ''}</div>
      <div class="h-chapter">${data.chapter}</div>
      ${isChecked ? checkedLabel : (isFuture ? '' : '<div style="font-size:0.75em;color:#666;margin-top:4px;">未打卡</div>')}
    </div>`;
  }).join('');
}

// ===== MODAL =====
function showDayModal(dateStr) {
  const data = bookContent[dateStr];
  if (!data) return;
  document.getElementById('modalTitle').textContent = data.chapter;
  document.getElementById('modalBody').innerHTML = data.content;
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
}

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

// ===== START =====
// init() 由登录逻辑控制调用

</script>
